name: CI

on:
  push:
    branches: [ main, "task-*" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python files for syntax errors
        run: |
          python -m py_compile $(find . -name "*.py")

      - name: Validate CSV files can be loaded (if present)
        run: |
          python -c "
          import pandas as pd
          import glob
          import sys

          csv_files = glob.glob('data/**/*.csv', recursive=True)
          if not csv_files:
              print('No CSV files found yet - skipping validation.')
              sys.exit(0)

          for f in csv_files:
              try:
                  df = pd.read_csv(f)
                  print(f'OK: {f} loaded with {len(df)} rows, {len(df.columns)} columns')
              except Exception as e:
                  print(f'FAILED: {f} could not be loaded - {e}')
                  sys.exit(1)
          "